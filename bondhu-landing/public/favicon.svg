<?xml version="1.0" encoding="UTF-8"?>
<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .black-ring { fill: none; stroke: #000000; stroke-width: 3; opacity: 0.9; }
      .green-ring { fill: none; stroke: #8DC137; stroke-width: 3; opacity: 0.9; }
    </style>
  </defs>
  <!-- White Disk Background -->
  <circle cx="16" cy="16" r="16" fill="#ffffff"/>
  
  <!-- Black ring (upper left) - converted from white -->
  <circle cx="12" cy="12" r="7" class="black-ring"/>
  
  <!-- Green ring (lower right, interlocking) -->
  <circle cx="20" cy="20" r="7" class="green-ring"/>
  
  <!-- Add some depth with inner shadows -->
  <circle cx="12" cy="12" r="5" fill="none" stroke="#000000" stroke-width="1" opacity="0.3"/>
  <circle cx="20" cy="20" r="5" fill="none" stroke="#8DC137" stroke-width="1" opacity="0.3"/>
</svg>